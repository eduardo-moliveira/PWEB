<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Pedra, Papel ou Tesoura</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<main class="game">
			<div class="game__card">
				<h1>Pedra, Papel ou Tesoura</h1>

				<form id="gameForm">
					<fieldset>
						<legend>Partida</legend>

						<div class="game__field">
							<label for="choices">Sua escolha:</label>
							<select id="choices" name="choices" required>
								<option value="">Selecione...</option>
							</select>
						</div>

						<div class="game__field">
							<label for="difficulty">Dificuldade:</label>
							<select
								id="difficulty"
								name="difficulty"
								required
							></select>
						</div>
					</fieldset>

					<button type="submit">Jogar</button>
				</form>

				<section id="gameResult" aria-live="polite">
					Faça sua jogada para ver o resultado.
				</section>
			</div>
		</main>

		<script src="script.js"></script>
	</body>
</html>
